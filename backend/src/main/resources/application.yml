spring:
  application:
    name: hotel-manager
  data:
    web:
      pageable:
        max-page-size: 100
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hotelmanager}
    username: ${SPRING_DATASOURCE_USERNAME:hotel}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  # Forwarded headers are resolved explicitly only for configured trusted proxies.
  forward-headers-strategy: none

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:900}
    issuer: ${JWT_ISSUER:hotel-manager}
  refresh-token:
    expiration-seconds: ${REFRESH_TOKEN_EXPIRATION_SECONDS:604800}
    secure: ${REFRESH_TOKEN_SECURE:false}
    cookie-name: hotel_refresh
    cookie-path: /api/auth
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
  bootstrap-users:
    enabled: ${BOOTSTRAP_USERS_ENABLED:false}
    admin-email: ${BOOTSTRAP_ADMIN_EMAIL:}
    admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:}
    receptionist-email: ${BOOTSTRAP_RECEPTIONIST_EMAIL:}
    receptionist-password: ${BOOTSTRAP_RECEPTIONIST_PASSWORD:}
  security:
    expose-docs: ${APP_SECURITY_EXPOSE_DOCS:false}
    expose-h2-console: ${APP_SECURITY_EXPOSE_H2_CONSOLE:false}
    trusted-proxy-cidrs: ${TRUSTED_PROXY_CIDRS:}
    auth-rate-limit:
      enabled: ${AUTH_RATE_LIMIT_ENABLED:true}
      max-attempts: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:10}
      window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
      max-tracked-keys: ${AUTH_RATE_LIMIT_MAX_TRACKED_KEYS:10000}

springdoc:
  api-docs:
    path: /api/openapi.json
    enabled: ${APP_SECURITY_EXPOSE_DOCS:false}
  swagger-ui:
    path: /api/docs
    enabled: ${APP_SECURITY_EXPOSE_DOCS:false}
  default-produces-media-type: application/json
