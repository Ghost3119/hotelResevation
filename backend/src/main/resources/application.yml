spring:
  application:
    name: hotel-manager
  data:
    web:
      pageable:
        max-page-size: 100
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hotelmanager}
    username: ${SPRING_DATASOURCE_USERNAME:hotel}
    password: ${SPRING_DATASOURCE_PASSWORD:hotel_secret_change_me}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-key-at-least-256-bits-long-for-hs256}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:900}
    issuer: ${JWT_ISSUER:hotel-manager}
  refresh-token:
    expiration-seconds: ${REFRESH_TOKEN_EXPIRATION_SECONDS:604800}
    secure: ${REFRESH_TOKEN_SECURE:false}
    cookie-name: hotel_refresh
    cookie-path: /api/auth
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
  security:
    expose-docs: ${APP_SECURITY_EXPOSE_DOCS:true}
    expose-h2-console: ${APP_SECURITY_EXPOSE_H2_CONSOLE:false}
    auth-rate-limit:
      enabled: ${AUTH_RATE_LIMIT_ENABLED:true}
      max-attempts: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:30}
      window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}

springdoc:
  api-docs:
    path: /api/openapi.json
  swagger-ui:
    path: /api/docs
    enabled: true
  default-produces-media-type: application/json
