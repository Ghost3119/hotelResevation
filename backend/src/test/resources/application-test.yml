spring:
  data:
    web:
      pageable:
        max-page-size: 100
  datasource:
    url: jdbc:h2:mem:hoteltest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false

server:
  port: 0

app:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret-32bytes
    expiration-seconds: 3600
    issuer: hotel-manager-test
  cors:
    allowed-origins: http://localhost:5173

springdoc:
  api-docs:
    path: /api/openapi.json
  swagger-ui:
    path: /api/docs
    enabled: true
