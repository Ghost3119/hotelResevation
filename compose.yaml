name: hotel-manager

services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hotelmanager}
      POSTGRES_USER: ${POSTGRES_USER:-hotel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotel_secret_change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotel} -d ${POSTGRES_DB:-hotelmanager}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hotel-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hotelmanager}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hotel}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hotel_secret_change_me}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret-key-at-least-256-bits-long-for-hs256}
      JWT_ACCESS_TOKEN_EXPIRATION_SECONDS: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:-900}
      JWT_ISSUER: ${JWT_ISSUER:-hotel-manager}
      REFRESH_TOKEN_EXPIRATION_SECONDS: ${REFRESH_TOKEN_EXPIRATION_SECONDS:-604800}
      REFRESH_TOKEN_SECURE: ${REFRESH_TOKEN_SECURE:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-https://*.ngrok-free.dev}
      APP_SECURITY_EXPOSE_DOCS: ${APP_SECURITY_EXPOSE_DOCS:-true}
      APP_SECURITY_EXPOSE_H2_CONSOLE: ${APP_SECURITY_EXPOSE_H2_CONSOLE:-false}
      AUTH_RATE_LIMIT_ENABLED: ${AUTH_RATE_LIMIT_ENABLED:-true}
      AUTH_RATE_LIMIT_MAX_ATTEMPTS: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:-30}
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-60}
    ports:
      - "8080:8080"
    networks:
      - hotel-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: hotel-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - hotel-net

volumes:
  postgres_data:

networks:
  hotel-net:
    driver: bridge
