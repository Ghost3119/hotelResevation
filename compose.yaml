name: hotel-manager

services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hotelmanager}
      POSTGRES_USER: ${POSTGRES_USER:-hotel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotel_secret_change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotel} -d ${POSTGRES_DB:-hotelmanager}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hotel-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hotelmanager}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hotel}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hotel_secret_change_me}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret-key-at-least-256-bits-long-for-hs256}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      JWT_ISSUER: ${JWT_ISSUER:-hotel-manager}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"
    networks:
      - hotel-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hotel-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - hotel-net

volumes:
  postgres_data:

networks:
  hotel-net:
    driver: bridge
