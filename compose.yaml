name: hotel-manager

services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hotelmanager}
      POSTGRES_USER: ${POSTGRES_USER:-hotel}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotel} -d ${POSTGRES_DB:-hotelmanager}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - database-net
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hotelmanager}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hotel}
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set in .env}"
      JWT_ACCESS_TOKEN_EXPIRATION_SECONDS: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:-900}
      JWT_ISSUER: ${JWT_ISSUER:-hotel-manager}
      REFRESH_TOKEN_EXPIRATION_SECONDS: ${REFRESH_TOKEN_EXPIRATION_SECONDS:-604800}
      REFRESH_TOKEN_SECURE: ${REFRESH_TOKEN_SECURE:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-}
      APP_SECURITY_EXPOSE_DOCS: ${APP_SECURITY_EXPOSE_DOCS:-false}
      APP_SECURITY_EXPOSE_H2_CONSOLE: ${APP_SECURITY_EXPOSE_H2_CONSOLE:-false}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-172.16.0.0/12}
      AUTH_RATE_LIMIT_ENABLED: ${AUTH_RATE_LIMIT_ENABLED:-true}
      AUTH_RATE_LIMIT_MAX_ATTEMPTS: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:-10}
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-60}
      AUTH_RATE_LIMIT_MAX_TRACKED_KEYS: ${AUTH_RATE_LIMIT_MAX_TRACKED_KEYS:-10000}
      BOOTSTRAP_USERS_ENABLED: ${BOOTSTRAP_USERS_ENABLED:-false}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_RECEPTIONIST_EMAIL: ${BOOTSTRAP_RECEPTIONIST_EMAIL:-}
      BOOTSTRAP_RECEPTIONIST_PASSWORD: ${BOOTSTRAP_RECEPTIONIST_PASSWORD:-}
    networks:
      - database-net
      - application-net
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: hotel-frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:80"
    networks:
      - application-net
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:

networks:
  database-net:
    internal: true
    driver: bridge
  application-net:
    driver: bridge
